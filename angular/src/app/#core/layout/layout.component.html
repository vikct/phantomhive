<tui-root [attr.tuiTheme]="darkMode() ? 'dark' : null">
  @if (authService.isAuthenticated()) {
  <div class="layout-container">
    <!-- Sidebar Left (Primary Navigation) -->
    <app-sidebar class="sidebar"></app-sidebar>

    <!-- Right Column (Header + Content) -->
    <div class="main-column" #mainColumn (scroll)="onScroll(mainColumn.scrollTop)">
      <app-header class="header" [class.is-scrolled]="scrolled"></app-header>

      <main class="content-area">
        <div class="content-wrapper">
          <ng-container *ngTemplateOutlet="contentTemplate"></ng-container>
        </div>
        <app-footer class="footer"></app-footer>
      </main>
    </div>
  </div>
  } @else {
  <ng-container *ngTemplateOutlet="contentTemplate"></ng-container>
  }
</tui-root>

<ng-template #contentTemplate>
  <ng-content></ng-content>
</ng-template>
